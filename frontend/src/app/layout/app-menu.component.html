<aside class="sidebar">
  <div class="brand">
    <div class="brand-mark">RG</div>
    <div>
      <h1>RiskGraph</h1>
      <p>TransactionRiskEngine</p>
    </div>
  </div>

  <nav aria-label="Main navigation">

        [routerLinkActiveOptions]="{ exact: true }">
        {{ item.label }}
      </a>
    }
  </nav>
