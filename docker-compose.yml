services:
  postgres:
    image: postgres:14
    container_name: transaction-risk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: transaction_risk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - transaction-risk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transaction_risk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  transaction-risk-postgres-data:
